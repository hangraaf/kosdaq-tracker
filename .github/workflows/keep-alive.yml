name: Render Keep-Alive

on:
  schedule:
    - cron: "*/14 * * * *"   # 14분마다 실행
  workflow_dispatch:          # 수동 실행 허용

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kosdaq-tracker.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned $STATUS"
          fi

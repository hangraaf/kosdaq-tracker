<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSDAQ Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --border-color: #30363d;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        
        .sidebar {
            background-color: var(--bg-secondary);
            min-height: 100vh;
            border-right: 1px solid var(--border-color);
        }
        
        .stock-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        
        .stock-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-blue);
        }
        
        .stock-name {
            font-weight: 600;
            font-size: 1.1em;
        }
        
        .stock-price {
            font-size: 1.3em;
            font-weight: 700;
        }
        
        .price-up {
            color: var(--accent-green);
        }
        
        .price-down {
            color: var(--accent-red);
        }
        
        .search-box {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .search-input {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 15px;
            border-radius: 6px;
        }
        
        .search-input:focus {
            border-color: var(--accent-blue);
            outline: none;
        }
        
        .btn-primary-custom {
            background-color: var(--accent-blue);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
        }
        
        .btn-primary-custom:hover {
            background-color: #4090e0;
        }
        
        .nav-link {
            color: var(--text-secondary);
            padding: 12px 20px;
            border-radius: 6px;
            margin: 5px 0;
        }
        
        .nav-link:hover, .nav-link.active {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        .nav-link i {
            margin-right: 10px;
            width: 20px;
        }
        
        .table {
            color: var(--text-primary);
        }
        
        .table-dark {
            --bs-table-bg: var(--bg-secondary);
            --bs-table-striped-bg: var(--bg-tertiary);
            --bs-table-hover-bg: var(--bg-tertiary);
        }
        
        .badge-up {
            background-color: var(--accent-green);
            color: #fff;
        }
        
        .badge-down {
            background-color: var(--accent-red);
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-chart-line me-2"></i>KOSDAQ Tracker
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-home"></i>홈</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/portfolio"><i class="fas fa-briefcase"></i>포트폴리오</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-3">
                <h5 class="text-secondary mb-3">메뉴</h5>
                <nav class="nav flex-column">
                    <a class="nav-link active" href="/">
                        <i class="fas fa-list"></i>종목 목록
                    </a>
                    <a class="nav-link" href="/portfolio">
                        <i class="fas fa-briefcase"></i>포트폴리오
                    </a>
                </nav>
                
                <h5 class="text-secondary mb-3 mt-4">즐겨찾기</h5>
                <div id="favorites-list">
                    <p class="text-muted">즐겨찾기한 종목을 표시합니다.</p>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <!-- Search Box -->
                <div class="search-box">
                    <form action="/search" method="get" class="row g-3">
                        <div class="col-md-10">
                            <input type="text" name="keyword" class="form-control search-input" 
                                   placeholder="종목명 또는 코드 검색..." th:value="${keyword}">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary-custom w-100">
                                <i class="fas fa-search me-2"></i>검색
                            </button>
                        </div>
                    </form>
                </div>
                
                <!-- Stock List -->
                <h4 class="mb-3"><i class="fas fa-chart-line me-2"></i>코스닥 종목</h4>
                <div class="row" id="stock-list">
                    <div th:each="stock : ${stocks}" class="col-md-3 mb-3">
                        <div class="stock-card" th:onclick="'location.href=\'/chart/' + ${stock.stockCode} + '\''">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="stock-name" th:text="${stock.stockName}">종목명</div>
                                    <div class="text-muted small" th:text="${stock.stockCode}">코드</div>
                                </div>
                                <button class="btn btn-sm btn-outline-secondary" 
                                        th:onclick="'addFavorite(\'' + ${stock.stockCode} + '\', \'' + ${stock.stockName} + '\')'">
                                    <i class="far fa-star"></i>
                                </button>
                            </div>
                            <div class="mt-2">
                                <div class="stock-price" th:text="${stock.currentPrice} + '원'">가격</div>
                                <div th:class="${stock.changeRate.startsWith('-')} ? 'price-down' : 'price-up'">
                                    <span th:text="${stock.changeRate} + '%'">등락률</span>
                                    <i th:class="${stock.changeRate.startsWith('-')} ? 'fas fa-caret-down' : 'fas fa-caret-up'"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function addFavorite(stockCode, stockName) {
            fetch('/favorite/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'stockCode=' + stockCode + '&stockName=' + stockName
            }).then(response => {
                if (response.ok) {
                    alert('즐겨찾기에 추가되었습니다.');
                    location.reload();
                }
            });
        }
    </script>
</body>
</html>

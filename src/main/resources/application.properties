# KOSDAQ Tracker Application

spring.application.name=kosdaq-tracker

# Server Configuration
server.port=8080

# Korea Investment API Configuration
korea-investment.app-key=
korea-investment.app-secret=
korea-investment.base-url=https://api.kiwoom.com

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:kosdaqdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Logging
logging.level.com.tracker.kosdaq=DEBUG
logging.level.org.springframework.web=INFO